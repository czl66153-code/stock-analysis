<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经济周期与股票分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        .search-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .input-group {
            flex: 1;
            min-width: 200px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }
        
        input::placeholder {
            color: #666;
        }
        
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .stock-info {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,212,255,0.1);
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.3);
        }
        
        .stock-info h3 {
            color: #00d4ff;
            margin-bottom: 12px;
        }
        
        .stock-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        
        .meta-item {
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        
        .meta-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }
        
        .meta-value {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .chart-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #chart {
            width: 100%;
            height: 500px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: #888;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            padding: 20px;
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            border-radius: 12px;
            color: #ff6b6b;
            text-align: center;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .quick-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .quick-link {
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quick-link:hover {
            background: rgba(0,212,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 经济周期与股票分析</h1>
            <p class="subtitle">输入股票代码或名称，查看历史走势与技术分析</p>
        </header>
        
        <section class="search-section">
            <div class="search-box">
                <div class="input-group">
                    <label>股票代码或名称</label>
                    <input type="text" id="stockCode" placeholder="如: 600519 (茅台) 或 000001 (平安)" value="000001">
                </div>
                <div class="input-group">
                    <label>开始日期</label>
                    <input type="date" id="startDate" value="2024-01-01">
                </div>
                <div class="input-group">
                    <label>结束日期</label>
                    <input type="date" id="endDate" value="2026-04-02">
                </div>
                <div class="input-group" style="display: flex; align-items: flex-end;">
                    <button class="btn btn-primary" id="searchBtn" onclick="searchStock()">
                        🔍 查询
                    </button>
                </div>
            </div>
            
            <div class="quick-links">
                <span style="color: #888; font-size: 0.9rem;">快捷:</span>
                <span class="quick-link" onclick="quickSearch('600519')">贵州茅台</span>
                <span class="quick-link" onclick="quickSearch('000001')">平安银行</span>
                <span class="quick-link" onclick="quickSearch('601899')">紫金矿业</span>
                <span class="quick-link" onclick="quickSearch('000858')">五粮液</span>
                <span class="quick-link" onclick="quickSearch('600036')">招商银行</span>
            </div>
            
            <div id="stockInfo" class="stock-info" style="display: none;"></div>
            <div id="error" class="error" style="display: none;"></div>
        </section>
        
        <section class="chart-section">
            <div id="chart"></div>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                加载中...
            </div>
        </section>
        
        <footer>
            <p>数据来源: akshare · 免费开源</p>
            <p style="margin-top: 8px;">本工具仅供参考，不构成投资建议</p>
        </footer>
    </div>
    
    <script>
        // ECharts实例
        let chart = null;
        
        // 初始化图表
        function initChart() {
            chart = echarts.init(document.getElementById('chart'));
            window.addEventListener('resize', () => chart.resize());
        }
        
        // 快捷搜索
        function quickSearch(code) {
            document.getElementById('stockCode').value = code;
            searchStock();
        }
        
        // 显示加载
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('chart').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('stockInfo').style.display = 'none';
        }
        
        // 隐藏加载
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('chart').style.display = 'block';
        }
        
        // 显示错误
        function showError(msg) {
            hideLoading();
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }
        
        // 显示股票信息
        function showStockInfo(data) {
            const infoDiv = document.getElementById('stockInfo');
            infoDiv.innerHTML = `
                <h3>${data.name} (${data.code})</h3>
                <div class="stock-meta">
                    <div class="meta-item">
                        <div class="meta-label">最新价</div>
                        <div class="meta-value" style="color: ${data.change >= 0 ? '#ff6b6b' : '#51cf66'}">
                            ¥${data.latestPrice?.toFixed(2) || 'N/A'}
                        </div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">涨跌幅</div>
                        <div class="meta-value" style="color: ${data.change >= 0 ? '#ff6b6b' : '#51cf66'}">
                            ${data.change >= 0 ? '+' : ''}${data.change?.toFixed(2) || 'N/A'}%
                        </div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">成交量</div>
                        <div class="meta-value">${(data.volume / 100000000).toFixed(2)}亿股</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">成交额</div>
                        <div class="meta-value">${(data.amount / 100000000).toFixed(2)}亿元</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">最高</div>
                        <div class="meta-value">¥${data.high?.toFixed(2) || 'N/A'}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">最低</div>
                        <div class="meta-value">¥${data.low?.toFixed(2) || 'N/A'}</div>
                    </div>
                </div>
            `;
            infoDiv.style.display = 'block';
        }
        
        // 绘制图表
        function drawChart(data) {
            hideLoading();
            
            const dates = data.map(d => d.date);
            const prices = data.map(d => d.close);
            const volumes = data.map(d => d.volume);
            
            // 计算MA
            const ma5 = calculateMA(5, prices);
            const ma10 = calculateMA(10, prices);
            const ma20 = calculateMA(20, prices);
            
            const option = {
                backgroundColor: 'rgba(0,0,0,0.2)',
                borderRadius: 12,
                
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(30,30,30,0.9)',
                    borderColor: '#333',
                    textStyle: { color: '#fff' }
                },
                
                legend: {
                    data: ['价格', 'MA5', 'MA10', 'MA20', '成交量'],
                    textStyle: { color: '#aaa' },
                    top: 10
                },
                
                grid: [
                    { left: 60, right: 20, top: 60, height: '55%' },
                    { left: 60, right: 20, top: '75%', height: '15%' }
                ],
                
                xAxis: [
                    {
                        type: 'category',
                        data: dates,
                        gridIndex: 0,
                        axisLabel: { color: '#888', show: false },
                        axisLine: { lineStyle: { color: '#333' } }
                    },
                    {
                        type: 'category',
                        data: dates,
                        gridIndex: 1,
                        axisLabel: { color: '#888' },
                        axisLine: { lineStyle: { color: '#333' } }
                    }
                ],
                
                yAxis: [
                    {
                        type: 'value',
                        gridIndex: 0,
                        axisLabel: { color: '#888', formatter: '¥{value}' },
                        splitLine: { lineStyle: { color: '#222' } },
                        scale: true
                    },
                    {
                        type: 'value',
                        gridIndex: 1,
                        axisLabel: { color: '#888', formatter: v => (v/100000000).toFixed(0) + '亿' },
                        splitLine: { show: false },
                        max: Math.max(...volumes) * 2
                    }
                ],
                
                series: [
                    {
                        name: '价格',
                        type: 'line',
                        data: prices,
                        smooth: true,
                        lineStyle: { width: 2, color: '#00d4ff' },
                        itemStyle: { color: '#00d4ff' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(0,212,255,0.3)' },
                                { offset: 1, color: 'rgba(0,212,255,0)' }
                            ])
                        }
                    },
                    {
                        name: 'MA5',
                        type: 'line',
                        data: ma5,
                        smooth: true,
                        lineStyle: { width: 1, color: '#ff6b6b' },
                        showSymbol: false
                    },
                    {
                        name: 'MA10',
                        type: 'line',
                        data: ma10,
                        smooth: true,
                        lineStyle: { width: 1, color: '#ffd93d' },
                        showSymbol: false
                    },
                    {
                        name: 'MA20',
                        type: 'line',
                        data: ma20,
                        smooth: true,
                        lineStyle: { width: 1, color: '#6bcb77' },
                        showSymbol: false
                    },
                    {
                        name: '成交量',
                        type: 'bar',
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        data: volumes,
                        itemStyle: {
                            color: params => prices[params.dataIndex] >= prices[params.dataIndex - 1] 
                                ? 'rgba(255,107,107,0.6)' 
                                : 'rgba(81,207,102,0.6)'
                        }
                    }
                ]
            };
            
            chart.setOption(option);
        }
        
        // 计算均线
        function calculateMA(day, data) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < day - 1) {
                    result.push('-');
                } else {
                    const sum = data.slice(i - day + 1, i + 1).reduce((a, b) => a + b, 0);
                    result.push((sum / day).toFixed(2));
                }
            }
            return result;
        }
        
        // 搜索股票
        async function searchStock() {
            const code = document.getElementById('stockCode').value.trim();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!code) {
                showError('请输入股票代码');
                return;
            }
            
            // 转换代码格式
            let apiCode = code;
            if (code.startsWith('6')) {
                apiCode = 'sh' + code;
            } else if (code.startsWith('0') || code.startsWith('3')) {
                apiCode = 'sz' + code;
            }
            
            showLoading();
            
            try {
                // Railway 后端地址
                const API_BASE = 'https://stock-analysis-production.up.railway.app';
                
                // 调用后端API获取数据
                const response = await fetch(`${API_BASE}/stock/${apiCode}?start=${startDate}&end=${endDate}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error('获取数据失败，请稍后重试');
                }
                
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                showStockInfo(result.info);
                drawChart(result.data);
                
            } catch (error) {
                console.error('Error:', error);
                showError(error.message || '查询失败，请检查股票代码是否正确');
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            // 默认查询平安银行
            // searchStock();
        });
    </script>
</body>
</html>
